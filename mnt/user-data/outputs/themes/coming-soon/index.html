<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Скоро открытие</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#050a0f;color:#e0e6f0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,#0d2040 0%,transparent 60%),radial-gradient(ellipse at 70% 60%,#040d1a 0%,transparent 60%);z-index:0}
.wrap{position:relative;z-index:1;text-align:center;padding:2rem;max-width:560px;width:100%}
.status{display:inline-flex;align-items:center;gap:.5rem;color:#3fb950;font-size:.8rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2rem}
.dot{width:7px;height:7px;background:#3fb950;border-radius:50%;animation:p 2s ease-in-out infinite}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
h1{font-size:clamp(2rem,6vw,3.5rem);font-weight:800;letter-spacing:-2px;line-height:1.1;margin-bottom:1rem;color:#fff}
h1 span{background:linear-gradient(135deg,#58a6ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#6b7fa3;font-size:1rem;line-height:1.7;margin-bottom:3rem;max-width:400px;margin-left:auto;margin-right:auto}
.cd{display:flex;gap:2rem;justify-content:center;margin-bottom:3rem}
.unit{text-align:center}
.num{font-size:2.5rem;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;line-height:1;display:block}
.lbl{font-size:.7rem;color:#4a5568;text-transform:uppercase;letter-spacing:1px;margin-top:.3rem}
.form{display:flex;gap:.5rem;max-width:360px;margin:0 auto}
.form input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:.65rem 1rem;color:#e0e6f0;font-size:.875rem;outline:none}
.form input::placeholder{color:#4a5568}
.form input:focus{border-color:rgba(88,166,255,.5)}
.form button{background:#58a6ff;color:#0d1117;border:none;border-radius:6px;padding:.65rem 1.25rem;font-size:.875rem;font-weight:700;cursor:pointer}
.form button:hover{opacity:.85}
.note{color:#2d3748;font-size:.75rem;margin-top:1rem}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="status"><span class="dot"></span>В разработке</div>
  <h1>Что-то <span>крутое</span><br>уже близко</h1>
  <p class="sub">Работаем над чем-то интересным. Оставьте email — уведомим первыми когда откроемся.</p>
  <div class="cd">
    <div class="unit"><span class="num" id="d">--</span><div class="lbl">дней</div></div>
    <div class="unit"><span class="num" id="h">--</span><div class="lbl">часов</div></div>
    <div class="unit"><span class="num" id="m">--</span><div class="lbl">минут</div></div>
    <div class="unit"><span class="num" id="s">--</span><div class="lbl">секунд</div></div>
  </div>
  <form class="form" onsubmit="return false">
    <input type="email" placeholder="ваш@email.com">
    <button>Уведомить</button>
  </form>
  <p class="note">Никакого спама. Только одно письмо.</p>
</div>
<script>
const launch=new Date(Date.now()+30*24*60*60*1000);
function tick(){
  const d=launch-Date.now();if(d<=0)return;
  document.getElementById('d').textContent=String(Math.floor(d/86400000)).padStart(2,'0');
  document.getElementById('h').textContent=String(Math.floor(d%86400000/3600000)).padStart(2,'0');
  document.getElementById('m').textContent=String(Math.floor(d%3600000/60000)).padStart(2,'0');
  document.getElementById('s').textContent=String(Math.floor(d%60000/1000)).padStart(2,'0');
}
tick();setInterval(tick,1000);
</script>
</body></html>
